# Dependabot version updates are disabled. We rely on Dependabot security
# updates (configured in repo Settings > Code security) for vulnerability patches.
# To re-enable version updates, increase open-pull-requests-limit.

version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 0
